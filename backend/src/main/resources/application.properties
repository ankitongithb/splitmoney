# Server
server.port=${PORT:8080}

# MySQL DataSource
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/splitsmoney?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialise schema + seed (set SQL_INIT_MODE=never on production after first deploy)
spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:seed.sql
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=${JWT_SECRET:VGhpcyBpcyBhIHZlcnkgbG9uZyBhbmQgc2VjdXJlIHNlY3JldCBrZXkgZm9yIFNwbGl0TW9uZXkgYXBwIDIwMjQ=}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads/receipts}

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_your_key_id}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your_razorpay_secret}

# CORS — Frontend URL for production
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Logging
logging.level.com.splitmoney=INFO
logging.level.org.springframework.security=WARN
