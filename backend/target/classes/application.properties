# Server
server.port=8080

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/splitsmoney?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
# ⚠ Set your MySQL root password below! Leave blank ONLY if your local MySQL explicitly allows empty passwords.
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Hibernate 6 (Spring Boot 3) prefers the generic MySQLDialect instead of deprecated MySQL8Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialise schema + seed (run once, then set to never)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:seed.sql
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=VGhpcyBpcyBhIHZlcnkgbG9uZyBhbmQgc2VjdXJlIHNlY3JldCBrZXkgZm9yIFNwbGl0TW9uZXkgYXBwIDIwMjQ=
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/receipts

# Razorpay (Test Keys)
razorpay.key.id=rzp_test_your_key_id
razorpay.key.secret=your_razorpay_secret

# Logging
logging.level.com.splitmoney=INFO
logging.level.org.springframework.security=WARN
